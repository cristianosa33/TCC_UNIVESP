<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Registrar Ocorrência - TCC</title>
    <link rel="stylesheet" href="../static/style.css"> <style>
        .form-container { max-width: 500px; margin: 20px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; font-family: sans-serif; }
        .campo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; width: 100%; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Reportar Problema Urbano</h2>
        <form action="/api/registrar" method="POST" enctype="multipart/form-data">
            
            <div class="campo">
                <label for="categoria">Categoria:</label>
                <select name="categoria" id="categoria" required>
                    <option value="Arborização">Arborização (Poda/Queda)</option>
                    <option value="Resíduos">Descarte de Resíduos</option>
                    <option value="Infraestrutura">Iluminação/Vias</option>
                </select>
            </div>

            <div class="campo">
                <label for="descricao">Descrição:</label>
                <textarea name="descricao" id="descricao" rows="4" placeholder="Descreva o problema..."></textarea>
            </div>

            <input type="hidden" name="latitude" id="latitude">
            <input type="hidden" name="longitude" id="longitude">

            <div class="campo">
                <label for="foto">Anexar Foto:</label>
                <input type="file" name="foto" id="foto" accept="image/*" required>
            </div>

            <p id="status-gps" style="color: blue; font-size: 0.9em;">Obtendo localização...</p>

            <button type="submit" id="btn-enviar" disabled>Enviar Registro</button>
        </form>
    </div>

    <script>
        // Captura a localização assim que a página carrega
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    document.getElementById('latitude').value = pos.coords.latitude;
                    document.getElementById('longitude').value = pos.coords.longitude;
                    document.getElementById('status-gps').innerText = "📍 Localização capturada com sucesso!";
                    document.getElementById('status-gps').style.color = "green";
                    document.getElementById('btn-enviar').disabled = false;
                },
                (err) => {
                    document.getElementById('status-gps').innerText = "❌ Erro ao obter GPS. Verifique as permissões.";
                    document.getElementById('status-gps').style.color = "red";
                }
            );
        }
    </script>
</body>
</html>
