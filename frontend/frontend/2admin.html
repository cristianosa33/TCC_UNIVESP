<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo - Gestão Urbana</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f7f6; }
        h1 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #34495e; color: white; }
        tr:hover { background-color: #f1f1f1; }
        .btn-foto { background: #3498db; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .badge { padding: 5px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .Alta { background: #e74c3c; color: white; }
        .Media { background: #f1c40f; color: black; }
        .Baixa { background: #2ecc71; color: white; }
        #modal-foto { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 8px; z-index: 1000; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
    </style>
</head>
<body>

    <h1>📋 Gestão de Demandas</h1>
    <p>Lista de ocorrências registradas pela população.</p>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Categoria</th>
                <th>Criticidade</th>
                <th>Data</th>
                <th>Evidência</th>
            </tr>
        </thead>
        <tbody id="tabela-corpo">
            </tbody>
    </table>

    <div class="overlay" id="overlay" onclick="fecharModal()"></div>
    <div id="modal-foto">
        <img id="img-modal" src="" style="max-width: 400px; display: block; border-radius: 4px;">
        <br>
        <button onclick="fecharModal()">Fechar</button>
    </div>

    <script>
        // Busca os dados da mesma API que o mapa usa
        fetch('/api/ocorrencias')
            .then(res => res.json())
            .then(dados => {
                const tbody = document.getElementById('tabela-corpo');
                dados.forEach(d => {
                    const row = `
                        <tr>
                            <td>${d.id}</td>
                            <td>${d.categoria}</td>
                            <td><span class="badge ${d.criticidade}">${d.criticidade}</span></td>
                            <td>${new Date(d.data_criacao).toLocaleDateString('pt-BR')}</td>
                            <td>
                                <button class="btn-foto" onclick="verFoto('${d.foto_url}')">Ver Foto</button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            });

        function verFoto(url) {
            if(url) {
                document.getElementById('img-modal').src = '/static/' + url;
                document.getElementById('modal-foto').style.display = 'block';
                document.getElementById('overlay').style.display = 'block';
            } else {
                alert("Nenhuma foto anexada.");
            }
        }

        function fecharModal() {
            document.getElementById('modal-foto').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
