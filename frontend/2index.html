<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Monitoramento Ambiental - TCC</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; border-radius: 10px; }
        .painel { padding: 20px; font-family: Arial, sans-serif; }
    </style>
</head>
<body>
    <div class="painel">
        <h1>Monitoramento de Demandas Urbanas</h1>
        <p>Visualize abaixo as ocorrências georreferenciadas.</p>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Inicializa o mapa centralizado em São Paulo (ou sua região)
        const map = L.map('map').setView([-23.5505, -46.6333], 12);

        // Adiciona a camada de mapa do OpenStreetMap
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Exemplo de como adicionar um ponto (isso virá do seu banco depois)
        const marker = L.marker([-23.589, -46.634]).addTo(map)
            .bindPopup('<b>Descarte Irregular</b><br>Rua X, Vila Mariana.<br>Status: Pendente.');
    </script>
</body>
</html>
